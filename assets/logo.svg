<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" font-family="'DejaVu Sans','Arial',sans-serif">
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F5D0FE"/>
      <stop offset="0.5" stop-color="#C084FC"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="1274" height="414" rx="42" fill="#0A0613" stroke="#7C3AED" stroke-opacity="0.35" stroke-width="2"/>
  <ellipse cx="640" cy="210" rx="540" ry="180" fill="url(#glow)"/>

  <!-- left thunderbolt -->
  <g transform="translate(150,86)">
    <path d="M78 0 L12 152 L60 152 L34 274 L128 112 L78 112 Z" fill="url(#bolt)" opacity="0.45" filter="url(#soft)"/>
    <path d="M78 0 L12 152 L60 152 L34 274 L128 112 L78 112 Z" fill="url(#bolt)"/>
  </g>
  <!-- right thunderbolt (mirrored) -->
  <g transform="translate(1130,86) scale(-1,1)">
    <path d="M78 0 L12 152 L60 152 L34 274 L128 112 L78 112 Z" fill="url(#bolt)" opacity="0.45" filter="url(#soft)"/>
    <path d="M78 0 L12 152 L60 152 L34 274 L128 112 L78 112 Z" fill="url(#bolt)"/>
  </g>

  <!-- wordmark -->
  <text x="642" y="236" text-anchor="middle" font-size="128" font-weight="bold" font-style="italic" letter-spacing="1">
    <tspan fill="url(#violet)">Delta</tspan><tspan fill="#EDE9FE">Docs</tspan>
  </text>
  <!-- tagline -->
  <text x="644" y="318" text-anchor="middle" font-size="27" font-weight="bold" letter-spacing="7" fill="#A78BFA">CHANGE-TRACKED  ·  LLM-READY  ·  DELTA-ONLY</text>
</svg>
